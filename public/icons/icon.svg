<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="24" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Clock face -->
  <circle cx="64" cy="64" r="40" stroke="white" stroke-width="3" fill="none"/>
  <!-- Clock hands -->
  <line x1="64" y1="64" x2="64" y2="36" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="82" y2="64" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="white"/>
  <!-- Numbers -->
  <text x="64" y="30" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">12</text>
  <text x="90" y="69" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">3</text>
  <text x="64" y="102" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">6</text>
  <text x="38" y="69" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">9</text>
</svg>
